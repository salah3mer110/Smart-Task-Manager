<li class="card shadow-sm border-0 rounded-3 p-3 mb-3 list-unstyled">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="fs-5 fw-bold mb-0">{{task.title}}</h2>
        @if(task.status === 'done') {
        <span class="badge bg-success">✔ Completed</span>
        } @else {
        <span class="badge bg-warning text-dark">⏳ Pending</span>
        }
    </div>

    <!-- Date -->
    <time class="text-muted small d-block mb-2">
        <i>📅</i> {{task.dueDate | date:'fullDate'}}
    </time>

    <!-- Description -->
    <p class="text-secondary mb-2">{{task.description}}</p>

    <!-- Meta Info -->
    <div class="d-flex flex-wrap gap-2 mb-3">
        <span class="badge bg-info text-dark">🎯 {{task.priority}}</span>
        <span class="badge bg-secondary">📁 {{task.category}}</span>
        <span class="badge bg-light text-dark border">🏷️ {{task.tags}}</span>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2">
        <button class="btn btn-success btn-sm" (click)="onCompleteTask()">
            ✔ Done
        </button>
        <button class="btn btn-primary btn-sm" (click)="onEditTask()">
            ✏️ Update
        </button>
        <button class="btn btn-danger btn-sm" (click)="onDeleteTask()">
            🗑️ Delete
        </button>
    </div>

</li>
