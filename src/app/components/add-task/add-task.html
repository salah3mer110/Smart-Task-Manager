<div class="container my-4">
    <div class="card shadow-sm border-0 rounded-3 p-4">

        <h2 class="fw-bold mb-4">Add New Task</h2>

        <form (ngSubmit)="onSubmitTask()">

            <div class="mb-3">
                <label for="title" class="form-label fw-semibold">Task Title</label>
                <input id="title" type="text" class="form-control" placeholder="Enter task title"
                    [(ngModel)]="enteredTitle" name="title" />
            </div>

            <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Description</label>
                <textarea id="description" rows="3" class="form-control" placeholder="Enter description"
                    [(ngModel)]="enteredDescription" name="description">
                </textarea>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="priority" class="form-label fw-semibold">Priority</label>
                    <select id="priority" class="form-select" [(ngModel)]="enteredPriority" name="priority">
                        <option value="low">🟢 Low</option>
                        <option value="medium">🟡 Medium</option>
                        <option value="high">🔴 High</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="date" class="form-label fw-semibold">Due Date</label>
                    <input id="date" type="date" class="form-control" [(ngModel)]="enteredDate" name="date" />
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label for="category" class="form-label fw-semibold">Category</label>
                    <select id="category" class="form-select" [(ngModel)]="enteredCategory" name="category">
                        <option value="work">💼 Work</option>
                        <option value="personal">🏠 Personal</option>
                        <option value="study">📚 Study</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="tags" class="form-label fw-semibold">Tags</label>
                    <input id="tags" type="text" class="form-control" placeholder="Enter tags" [(ngModel)]="enteredTags"
                        name="tags" />
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-50">
                    ✔ Submit Task
                </button>
                <button type="button" class="btn btn-outline-secondary w-50" (click)="onCancelTask()">
                    ✖ Clear
                </button>
            </div>

        </form>
    </div>
</div>
